<!DOCTYPE html>
<html>

<head>
    <title>Thermal Radiation Analysis</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600&family=Space+Grotesk:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" href="./radiation_icon.svg" type="image/svg+xml">
    <script>
        (function () {
            try {
                // Default: light. Only use dark when the user has explicitly chosen it.
                if (localStorage.getItem('tra-theme') === 'dark') {
                    document.documentElement.removeAttribute('data-theme');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
    <style>
        :root {
            /* Shared accent (dark & light) */
            --tra-primary: #da2424;
            --tra-secondary: #bf574f;
            --tra-tertiary: #892a2a;
            --tra-accent: #da2424;
            --tra-accent-deep: #b01a1a;
            --tra-accent-light: #e8a098;
            --tra-accent-muted: rgba(218, 36, 36, 0.14);
            --tra-mint: #4ade80;
        }

        /* Dark theme (active when data-theme is not "light" — i.e. user chose “dark”) */
        html {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            color-scheme: dark;
            --tra-bg: #0a0a0c;
            --tra-panel: #12151e;
            --tra-panel-inner: #0e1118;
            --tra-border: #2a2832;
            --tra-text: #f0e8ea;
            --tra-muted: #ada8b0;
            --tra-topbar-bg: linear-gradient(180deg, #141824 0%, #0d1017 100%);
            --tra-toolbar-bg: #0d1017;
            --tra-flyout-bg: linear-gradient(165deg, #141922 0%, #0c0f14 48%, #0a0c11 100%);
            --tra-flyout-header-bg: linear-gradient(180deg, rgba(22, 27, 38, 0.98) 0%, rgba(12, 15, 22, 0.95) 100%);
            --tra-flyout-border: rgba(255, 255, 255, 0.08);
            --tra-flyout-shadow: 0 24px 48px rgba(0, 0, 0, 0.65);
            --tra-flyout-inset: inset 0 1px 0 rgba(255, 255, 255, 0.04);
            --tra-bottombar-bg: #0a0c11;
            --tra-scene-bg: #0b0e14;
            --tra-hover-wash: rgba(255, 255, 255, 0.04);
            --tra-card-bg: rgba(0, 0, 0, 0.22);
            --tra-card-border: rgba(255, 255, 255, 0.06);
            --tra-btn-ghost-bg: rgba(255, 255, 255, 0.05);
            --tra-btn-ghost-border: rgba(255, 255, 255, 0.1);
            --tra-input-bg: rgba(6, 8, 12, 0.92);
            --tra-input-border: rgba(255, 255, 255, 0.1);
            --tra-color-bracket-bg: rgba(0, 0, 0, 0.28);
            --tra-color-bracket-border: rgba(255, 255, 255, 0.1);
            --tra-color-input-bg: rgba(22, 26, 34, 0.98);
            --tra-manual-bg: rgba(255, 255, 255, 0.03);
            --tra-progress-track: rgba(0, 0, 0, 0.45);
            --tra-chip-inactive: rgba(255, 255, 255, 0.06);
            --tra-distance-pill-bg: rgba(255, 255, 255, 0.06);
            --tra-distance-pill-border: rgba(255, 255, 255, 0.08);
        }

        html[data-theme="light"] {
            color-scheme: light;
            --tra-bg: #ebe8ee;
            --tra-panel: #ffffff;
            --tra-panel-inner: #f7f5f9;
            --tra-border: #cfc8d4;
            --tra-text: #1c181b;
            --tra-muted: #5e5863;
            --tra-topbar-bg: linear-gradient(180deg, #ffffff 0%, #f3f1f6 100%);
            --tra-toolbar-bg: #ede8f0;
            --tra-flyout-bg: linear-gradient(165deg, #ffffff 0%, #f6f4f9 48%, #eeeaf2 100%);
            --tra-flyout-header-bg: linear-gradient(180deg, #faf9fc 0%, #f0ecf4 100%);
            --tra-flyout-border: rgba(0, 0, 0, 0.1);
            --tra-flyout-shadow: 0 20px 44px rgba(0, 0, 0, 0.12);
            --tra-flyout-inset: inset 0 1px 0 rgba(255, 255, 255, 0.98);
            --tra-bottombar-bg: #f4f2f7;
            --tra-scene-bg: #ddd9e4;
            --tra-hover-wash: rgba(0, 0, 0, 0.04);
            --tra-card-bg: rgba(255, 255, 255, 0.88);
            --tra-card-border: rgba(0, 0, 0, 0.08);
            --tra-btn-ghost-bg: rgba(255, 255, 255, 0.96);
            --tra-btn-ghost-border: rgba(0, 0, 0, 0.12);
            --tra-input-bg: #ffffff;
            --tra-input-border: rgba(0, 0, 0, 0.14);
            --tra-color-bracket-bg: rgba(0, 0, 0, 0.04);
            --tra-color-bracket-border: rgba(0, 0, 0, 0.1);
            --tra-color-input-bg: #ffffff;
            --tra-manual-bg: rgba(0, 0, 0, 0.03);
            --tra-progress-track: rgba(0, 0, 0, 0.12);
            --tra-chip-inactive: rgba(0, 0, 0, 0.04);
            --tra-distance-pill-bg: rgba(0, 0, 0, 0.05);
            --tra-distance-pill-border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
        }

        body.tra-app {
            height: 100%;
            max-height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            background: var(--tra-bg);
            color: var(--tra-text);
            font-family: 'Inter', 'Poppins', system-ui, sans-serif;
        }

        #app-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: 100%;
            min-height: 0;
            overflow: hidden;
        }

        .app-topbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
            padding: 0 16px 0 20px;
            background: var(--tra-topbar-bg);
            border-bottom: 1px solid var(--tra-border);
            z-index: 200;
            box-sizing: border-box;
        }

        .app-brand {
            font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.14em;
            color: var(--tra-text);
            flex-shrink: 0;
        }

        .app-topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
            flex: 1;
        }

        .tra-topbar-scene-rail {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
            max-width: min(62vw, 720px);
        }

        .tra-project-name-input {
            flex-shrink: 0;
            width: min(200px, 28vw);
            box-sizing: border-box;
            margin: 0;
            border: 1px solid transparent;
            background: transparent;
            color: var(--tra-text);
            font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .tra-project-name-input::placeholder {
            color: var(--tra-muted);
            font-weight: 500;
        }

        .tra-project-name-input:hover {
            background: var(--tra-btn-ghost-bg);
        }

        .tra-project-name-input:focus {
            outline: none;
            border-color: rgba(218, 36, 36, 0.45);
            background: var(--tra-panel-inner);
            box-shadow: 0 0 0 1px rgba(218, 36, 36, 0.2);
        }

        .tra-scene-strip {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 2px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(218, 36, 36, 0.35) transparent;
        }

        .tra-scene-strip::-webkit-scrollbar {
            height: 4px;
        }

        .tra-scene-strip::-webkit-scrollbar-thumb {
            background: rgba(218, 36, 36, 0.25);
            border-radius: 3px;
        }

        .tra-scene-pill-wrap {
            display: inline-flex;
            flex-direction: row;
            align-items: stretch;
            flex-shrink: 0;
            min-width: 120px;
            max-width: 300px;
            border-radius: 8px;
            border: 1px solid var(--tra-border);
            background: var(--tra-btn-ghost-bg);
            overflow: hidden;
            position: relative;
            transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .tra-scene-pill-wrap.is-active {
            border-color: rgba(218, 36, 36, 0.55);
            background: rgba(218, 36, 36, 0.12);
            box-shadow: inset 0 0 0 1px rgba(218, 36, 36, 0.12);
        }

        .tra-scene-pill {
            display: inline-flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            margin: 0;
            padding: 6px 4px 6px 10px;
            border: none;
            border-radius: 0;
            background: transparent;
            color: var(--tra-muted);
            font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .tra-scene-pill:hover {
            color: var(--tra-text);
        }

        .tra-scene-pill-wrap.is-active .tra-scene-pill {
            color: var(--tra-text);
        }

        .tra-scene-pill-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tra-scene-pill-rename-input {
            flex: 1;
            min-width: 0;
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 4px 6px 4px 8px;
            border: 1px solid rgba(218, 36, 36, 0.45);
            border-radius: 4px;
            background: var(--tra-panel-inner);
            color: var(--tra-text);
            font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            box-sizing: border-box;
        }

        .tra-scene-pill-rename-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(218, 36, 36, 0.2);
        }

        .tra-scene-pill-remove {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 0;
            min-width: 0;
            min-height: 100%;
            margin: 0;
            border: none;
            border-left: 1px solid transparent;
            background: transparent;
            color: var(--tra-muted);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            overflow: hidden;
            padding: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, width 0.12s ease, min-width 0.12s ease, background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
        }

        .tra-scene-pill-wrap:hover .tra-scene-pill-remove,
        .tra-scene-pill-wrap:focus-within .tra-scene-pill-remove {
            width: 28px;
            min-width: 28px;
            opacity: 1;
            border-left: 1px solid var(--tra-border);
            pointer-events: auto;
        }

        .tra-scene-pill-wrap.is-active:hover .tra-scene-pill-remove {
            border-left-color: rgba(218, 36, 36, 0.2);
        }

        .tra-scene-pill-remove:hover {
            color: var(--tra-accent);
            background: rgba(218, 36, 36, 0.1);
        }

        .tra-scene-add-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            margin: 0;
            padding: 0;
            border-radius: 8px;
            border: 1px dashed rgba(218, 36, 36, 0.4);
            background: rgba(218, 36, 36, 0.06);
            color: var(--tra-accent);
            font-size: 20px;
            font-weight: 400;
            line-height: 1;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
        }

        .tra-scene-add-btn:hover {
            background: rgba(218, 36, 36, 0.14);
            border-color: rgba(218, 36, 36, 0.55);
        }

        .tra-scene-add-btn:active {
            transform: scale(0.95);
        }

        .app-nav {
            display: flex;
            gap: 28px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--tra-muted);
        }

        .app-nav span.is-active {
            color: var(--tra-accent);
            box-shadow: 0 2px 0 0 var(--tra-accent);
            padding-bottom: 4px;
        }

        .app-topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 11px;
            flex-shrink: 0;
        }

        .app-engine-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(74, 222, 128, 0.08);
            color: var(--tra-mint);
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .app-engine-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--tra-mint);
            box-shadow: 0 0 6px var(--tra-mint);
        }

        .tra-theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 32px;
            padding: 0 12px;
            margin: 0;
            border: 1px solid var(--tra-border);
            border-radius: 8px;
            background: var(--tra-btn-ghost-bg);
            color: var(--tra-text);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .tra-theme-toggle:hover {
            background: rgba(218, 36, 36, 0.1);
            border-color: rgba(218, 36, 36, 0.35);
            color: var(--tra-accent);
        }

        .tra-theme-toggle .tra-theme-icon {
            display: inline-flex;
            width: 18px;
            height: 18px;
            line-height: 1;
        }

        .tra-theme-toggle .tra-theme-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
        }

        .app-icon-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            color: var(--tra-muted);
            cursor: default;
            font-size: 14px;
            opacity: 0.85;
        }

        .app-user {
            border: 1px solid var(--tra-border);
            border-radius: 50%;
            width: 30px;
            height: 30px;
        }

        #app-main-row {
            flex: 1;
            display: flex;
            min-height: 0;
            align-items: stretch;
        }

        /* Left chrome: 66px icon rail; secondary toolkit is absolutely positioned and overlays the scene so the renderer keeps a stable aspect ratio. */
        #tra-left-dock,
        .tra-left-dock {
            --tra-toolstrip-w: 66px;
            --tra-flyout-w: calc(220px * 0.85);
            display: flex;
            flex-direction: row;
            flex: 0 0 var(--tra-toolstrip-w);
            width: var(--tra-toolstrip-w);
            min-width: var(--tra-toolstrip-w);
            max-width: var(--tra-toolstrip-w);
            flex-shrink: 0;
            align-items: stretch;
            min-height: 0;
            max-height: 100%;
            height: 100%;
            position: relative;
            z-index: 120;
            overflow: visible;
            box-sizing: border-box;
        }

        #functionbox {
            width: var(--tra-toolstrip-w);
            flex: 0 0 var(--tra-toolstrip-w);
            height: 100%;
            max-height: 100%;
            background: var(--tra-toolbar-bg);
            border-right: 1px solid var(--tra-border);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .tra-manual-link {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 2px;
            margin: 0;
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-align: center;
            text-decoration: none;
            color: var(--tra-muted);
            background: var(--tra-manual-bg);
            border-bottom: 1px solid var(--tra-border);
            transition: color 0.15s ease, background 0.15s ease;
        }

        .tra-manual-link:hover {
            color: var(--tra-accent);
            background: rgba(218, 36, 36, 0.08);
        }

        .tra-manual-icon {
            width: 18px;
            height: 18px;
            opacity: 0.9;
        }

        .tra-toolkit-nav {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 1px;
            padding: 6px 4px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .tra-tool-validation {
            flex-shrink: 0;
            padding: 6px 4px;
            border-top: 1px solid var(--tra-border);
        }

        #validationbtn.tra-validation-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            width: 100%;
            margin: 0;
            padding: 6px 2px;
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-align: center;
            color: var(--tra-muted);
            background: var(--tra-manual-bg);
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid transparent;
            box-sizing: border-box;
        }

        #validationbtn.tra-validation-link:hover {
            color: var(--tra-accent);
            border-color: rgba(218, 36, 36, 0.35);
            background: rgba(218, 36, 36, 0.08);
        }

        .tra-tool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 3px;
            width: 100%;
            padding: 8px 2px 6px;
            margin: 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            color: var(--tra-muted);
            background: transparent;
            transition: color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        .tra-tool-item:hover {
            color: var(--tra-text);
            background: var(--tra-hover-wash);
        }

        .tra-tool-item.is-open {
            color: var(--tra-accent);
            background: rgba(218, 36, 36, 0.14);
            box-shadow: inset 0 0 0 1px rgba(218, 36, 36, 0.35);
        }

        .tra-tool-icon {
            width: 22px;
            height: 22px;
            display: block;
            opacity: 0.95;
        }

        .tra-tool-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .tra-tool-label {
            font-size: 6.5px;
            font-weight: 700;
            letter-spacing: 0.06em;
            line-height: 1.1;
            text-transform: uppercase;
            text-align: center;
            max-width: 100%;
        }

        .tra-tool-flyout {
            position: absolute;
            left: 100%;
            top: 0;
            bottom: 0;
            width: var(--tra-flyout-w);
            min-width: 0;
            max-width: var(--tra-flyout-w);
            height: 100%;
            min-height: 0;
            margin: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            background: var(--tra-flyout-bg);
            border: none;
            border-right: 1px solid var(--tra-border);
            border-radius: 0 8px 8px 0;
            box-shadow: 4px 0 28px rgba(0, 0, 0, 0.28);
            overflow: hidden;
        }

        .tra-tool-flyout[hidden] {
            display: none !important;
        }

        html[data-theme="light"] .tra-tool-flyout {
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
        }

        .tra-tool-flyout-grip {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            padding: 8px 8px 7px 10px;
            background: var(--tra-flyout-header-bg);
            border-bottom: 1px solid var(--tra-border);
        }

        .tra-tool-flyout-title {
            font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: var(--tra-text);
            text-transform: uppercase;
        }

        .tra-tool-flyout-title::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            margin-right: 6px;
            border-radius: 1px;
            background: var(--tra-accent);
            vertical-align: middle;
            box-shadow: 0 0 10px rgba(218, 36, 36, 0.55);
        }

        .tra-tool-flyout-close {
            border: none;
            background: var(--tra-btn-ghost-bg);
            color: var(--tra-muted);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .tra-tool-flyout-close:hover {
            color: var(--tra-text);
            background: rgba(218, 36, 36, 0.15);
        }

        .tra-tool-flyout-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 8px 12px 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(218, 36, 36, 0.35) transparent;
        }

        .tra-tool-flyout-body::-webkit-scrollbar {
            width: 6px;
        }

        .tra-tool-flyout-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .tra-tool-flyout-body::-webkit-scrollbar-thumb {
            background: rgba(218, 36, 36, 0.25);
            border-radius: 3px;
        }

        .tra-tool-flyout-body::-webkit-scrollbar-thumb:hover {
            background: rgba(218, 36, 36, 0.4);
        }

        #tra-panels-store {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        #tra-panels-store .tra-panel-body {
            pointer-events: auto;
        }

        #app-center {
            flex: 1;
            min-width: 0;
            min-height: 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #renderbody {

    <script>
        let traActivePanelId = null;

        function stashToolkitFlyoutBody() {
            const flyoutBody = document.getElementById('tra-tool-flyout-body');
            const store = document.getElementById('tra-panels-store');
            if (!flyoutBody || !store) return;
            while (flyoutBody.firstChild) {
                store.appendChild(flyoutBody.firstChild);
            }
            traActivePanelId = null;
        }

        function openToolkitPanel(panelId, triggerBtn) {
            const flyout = document.getElementById('tra-tool-flyout');
            const flyoutBody = document.getElementById('tra-tool-flyout-body');
            const titleEl = document.getElementById('tra-tool-flyout-title');
            const panel = document.getElementById(panelId);
            if (!flyout || !flyoutBody || !panel) return;

            if (traActivePanelId === panelId) {
                stashToolkitFlyoutBody();
                document.querySelectorAll('#functionbox .tra-tool-item.is-open').forEach(el => el.classList.remove('is-open'));
                flyout.hidden = true;
                return;
            }

            stashToolkitFlyoutBody();
            document.querySelectorAll('#functionbox .tra-tool-item.is-open').forEach(el => el.classList.remove('is-open'));
            if (triggerBtn) triggerBtn.classList.add('is-open');

            flyoutBody.appendChild(panel);
            traActivePanelId = panelId;
            const t = triggerBtn && triggerBtn.getAttribute('data-tool-title');
            if (titleEl) titleEl.textContent = t || 'Tool';
            flyout.hidden = false;
        }

        function closeToolkitFlyout() {
            const flyout = document.getElementById('tra-tool-flyout');
            stashToolkitFlyoutBody();
            document.querySelectorAll('#functionbox .tra-tool-item.is-open').forEach(el => el.classList.remove('is-open'));
            if (flyout) flyout.hidden = true;
        }

        // Configuration
        const CONFIG = {
            // Backend API URL - use localhost when running locally
            BACKEND_URL: 'http://localhost:8080',

            // API endpoints
            CALCULATE_ENDPOINT: '/calculate',
            CALCULATE_STREAM_ENDPOINT: '/calculate/stream',
            HEALTH_ENDPOINT: '/health',
            STATUS_ENDPOINT: '/status',

            // Request settings
            REQUEST_TIMEOUT: 60000, // 60 seconds
            MAX_RETRIES: 3
        };

        console.log("TRA app loaded");

        /** If JSON error body includes a string error/message, return it; else null. */
        function parseBackendErrorBody(text) {
            if (!text || !String(text).trim()) return null;
            try {
                const j = JSON.parse(text);
                if (typeof j.error === 'string' && j.error.trim()) return j.error.trim();
                if (typeof j.message === 'string' && j.message.trim()) return j.message.trim();
            } catch (_) { /* not JSON */ }
            return null;
        }

        /** @returns {{ ok: boolean, status: number|null, reason: string|null }} */
        async function checkBackendHealth() {
            const c = new AbortController();
            const t = setTimeout(function () { c.abort(); }, 5000);
            try {
                const response = await fetch(CONFIG.BACKEND_URL + CONFIG.HEALTH_ENDPOINT, {
                    method: 'GET',
                    cache: 'no-store',
                    signal: c.signal
                });
                const status = response.status;
                if (response.ok) {
                    return { ok: true, status: status, reason: null };
                }
                const text = await response.text();
                const reason = parseBackendErrorBody(text);
                return { ok: false, status: status, reason: reason };
            } catch (err) {
                console.warn('Backend health check failed', err);
                return { ok: false, status: null, reason: null };
            } finally {
                clearTimeout(t);
            }
        }

                });
                if (response.ok) {

                new THREE.Vector3(-halfWidth, -halfHeight, 0),  // Bottom-left
                new THREE.Vector3(halfWidth, -halfHeight, 0),   // Bottom-right
                new THREE.Vector3(halfWidth, halfHeight, 0),    // Top-right
                new THREE.Vector3(-halfWidth, halfHeight, 0)     // Top-left
            ];

            // Get world position and quaternion (important for grouped planes)
            const worldPosition = new THREE.Vector3();
            const worldQuaternion = new THREE.Quaternion();
            plane.mesh.getWorldPosition(worldPosition);
            plane.mesh.getWorldQuaternion(worldQuaternion);

            // Transform to world space using the mesh's actual world quaternion and position
            const worldCorners = localCorners.map(corner => {
                const worldCorner = corner.clone();
                worldCorner.applyQuaternion(worldQuaternion);
                worldCorner.add(worldPosition);
                return worldCorner;
            });

            // Find the two vertices that are furthest apart (the width edges)
            let maxDistance = 0;
            let edge1 = worldCorners[0];
            let edge2 = worldCorners[1];

            for (let i = 0; i < worldCorners.length; i++) {
                for (let j = i + 1; j < worldCorners.length; j++) {
                    const distance = worldCorners[i].distanceTo(worldCorners[j]);
                    if (distance > maxDistance) {
                        maxDistance = distance;
                        edge1 = worldCorners[i];
                        edge2 = worldCorners[j];
                    }
                }
            }

            return { edge1, edge2 };
        }

        function createTopViewLine(plane) {
            // Remove existing top view line if it exists
            if (plane.mesh.userData.topViewLine) {
                sceneContentGroup.remove(plane.mesh.userData.topViewLine);
                plane.mesh.userData.topViewLine = null;
            }

            // Remove existing spheres if they exist
            if (plane.mesh.userData.topViewSpheres) {
                plane.mesh.userData.topViewSpheres.forEach(sphere => {
                    sceneContentGroup.remove(sphere);
                });
                plane.mesh.userData.topViewSpheres = null;
            }

            // Create a line geometry representing the plane's length with fixed width
            const lineGeometry = new THREE.BufferGeometry();

            // Use the plane's width as the line length, with fixed width of 0.5
            const lineLength = plane.width;
            const fixedWidth = 0.3;

            // Create points for a simple line representing the plane's length
            const points = [
                new THREE.Vector3(-lineLength / 2, 0, -fixedWidth / 2),
                new THREE.Vector3(lineLength / 2, 0, -fixedWidth / 2),
                new THREE.Vector3(lineLength / 2, 0, fixedWidth / 2),
                new THREE.Vector3(-lineLength / 2, 0, fixedWidth / 2),
                new THREE.Vector3(-lineLength / 2, 0, -fixedWidth / 2) // Close the loop
            ];

            // Apply the plane's rotation to the points
            const rotationMatrix = new THREE.Matrix4();
            rotationMatrix.makeRotationFromEuler(new THREE.Euler(
                plane.incline * Math.PI / 180,
                plane.angle * Math.PI / 180,
                0
            ));

            points.forEach(point => {
                point.applyMatrix4(rotationMatrix);
            });

            lineGeometry.setFromPoints(points);

            // Create line material with plane's color
            const lineMaterial = new THREE.LineBasicMaterial({
                color: plane.color, // Use plane's color
                linewidth: 10
            });

            // Create the line mesh
            const line = new THREE.Line(lineGeometry, lineMaterial);

            // Position the line at the plane's WORLD position (important for grouped planes)
            const worldPosition = new THREE.Vector3();
            plane.mesh.getWorldPosition(worldPosition);
            line.position.copy(worldPosition);

            // Store reference to the parent plane
            line.userData.parentPlane = plane;

            // Store initial dimensions and rotation for change detection
            line.userData.lastWidth = plane.width;
            line.userData.lastAngle = plane.angle;
            line.userData.lastIncline = plane.incline;

            // Store reference to the line in the plane's userData
            plane.mesh.userData.topViewLine = line;

            // Create small spheres at the edges for width control
            const sphereGeometry = new THREE.SphereGeometry(0.3, 16, 12); // Larger spheres for easier clicking
            const sphereMaterial = new THREE.MeshBasicMaterial({
                color: plane.color,
                transparent: true,
                opacity: 0.9
                // MeshBasicMaterial doesn't respond to lighting, giving a flat 2D appearance
            });

            // Get the actual edge vertices of the plane
            const { edge1, edge2 } = getPlaneEdgeVertices(plane);

            // Create two spheres at the actual edge positions
            const sphere1 = new THREE.Mesh(sphereGeometry, sphereMaterial);
            const sphere2 = new THREE.Mesh(sphereGeometry, sphereMaterial);

            // IMPORTANT: Initialize userData BEFORE setting any properties
            sphere1.userData = {};
            sphere2.userData = {};

            // Position spheres at the actual edge vertices (X-Z coordinates only)
            sphere1.position.set(edge1.x, 0, edge1.z);
            sphere2.position.set(edge2.x, 0, edge2.z);

            // console.log(`Sphere positions from plane edges: (${edge1.x.toFixed(2)}, ${edge1.z.toFixed(2)}) to (${edge2.x.toFixed(2)}, ${edge2.z.toFixed(2)})`);

            // Store reference to parent plane and sphere index
            sphere1.userData.parentPlane = plane;
            sphere1.userData.sphereIndex = 0; // Left sphere
            sphere1.userData.isSelectable = true; // Set immediately after parentPlane

            sphere2.userData.parentPlane = plane;
            sphere2.userData.sphereIndex = 1; // Right sphere
            sphere2.userData.isSelectable = true; // Set immediately after parentPlane


            // Store spheres in plane's userData
            plane.mesh.userData.topViewSpheres = [sphere1, sphere2];

            // Set rendering order to ensure spheres appear on top of lines
            // Higher renderOrder values render on top
            line.renderOrder = 1;
            sphere1.renderOrder = 10; // Much higher to ensure they're always on top
            sphere2.renderOrder = 10;

            // Disable depth test for spheres so they always render on top
            sphere1.material.depthTest = false;
            sphere2.material.depthTest = false;

            // Add to scene (in content group for top-view rotation)
            sceneContentGroup.add(line);
            sceneContentGroup.add(sphere1);
            sceneContentGroup.add(sphere2);

            // Ensure spheres are always selectable (double-check)
            sphere1.userData.isSelectable = true;
            sphere2.userData.isSelectable = true;
        }

        // Function to update top view line when plane changes
        function updateTopViewLine(plane) {
            if (!plane || !plane.mesh) {
                return;
            }

            // If no top view line exists, create one
            if (!plane.mesh.userData.topViewLine) {
                createTopViewLine(plane);
                return;
            }

            const line = plane.mesh.userData.topViewLine;

            // Get the plane's current world position
            const worldPosition = new THREE.Vector3();
            plane.mesh.getWorldPosition(worldPosition);

            // Update the line's position to match plane's world position
            line.position.copy(worldPosition);

            // Update the line geometry to match current plane rotation
            const lineLength = plane.width;
            const fixedWidth = 0.3;

            // Create new points based on current rotation
            const points = [
                new THREE.Vector3(-lineLength / 2, 0, -fixedWidth / 2),
                new THREE.Vector3(lineLength / 2, 0, -fixedWidth / 2),
                new THREE.Vector3(lineLength / 2, 0, fixedWidth / 2),
                new THREE.Vector3(-lineLength / 2, 0, fixedWidth / 2),
                new THREE.Vector3(-lineLength / 2, 0, -fixedWidth / 2) // Close the loop
            ];

            // Apply the plane's rotation to the points
            const rotationMatrix = new THREE.Matrix4();
            rotationMatrix.makeRotationFromEuler(new THREE.Euler(
                plane.incline * Math.PI / 180,
                plane.angle * Math.PI / 180,
                0
            ));

            points.forEach(point => {
                point.applyMatrix4(rotationMatrix);
            });

            // Update the line geometry with new points
            line.geometry.setFromPoints(points);

            // Update spheres position if they exist
            if (plane.mesh.userData.topViewSpheres) {
                const spheres = plane.mesh.userData.topViewSpheres;

                // Get the actual edge vertices of the plane
                const { edge1, edge2 } = getPlaneEdgeVertices(plane);

                // Update sphere positions to match actual plane edges
                if (spheres[0] && spheres[1]) {
                    spheres[0].position.set(edge1.x, 0, edge1.z);
                    spheres[1].position.set(edge2.x, 0, edge2.z);
                }
            }

            // Check if dimensions changed significantly - if so, recreate for clean geometry
            const currentWidth = plane.width;
            const currentAngle = plane.angle;
            const currentIncline = plane.incline;

            // Only recreate if width changed significantly (rotation/position updates are handled above)
            if (line.userData.lastWidth && Math.abs(line.userData.lastWidth - currentWidth) > 0.01) {
                // Width changed, recreate everything for clean geometry
                sceneContentGroup.remove(line);
                if (plane.mesh.userData.topViewSpheres) {
                    plane.mesh.userData.topViewSpheres.forEach(sphere => {
                        sceneContentGroup.remove(sphere);
                    });
                }
                createTopViewLine(plane);

                // Ensure newly created spheres are selectable
                if (plane.mesh.userData.topViewSpheres) {
                    plane.mesh.userData.topViewSpheres.forEach((sphere, index) => {
                        sphere.userData.isSelectable = true;
                        sphere.userData.parentPlane = plane;
                        sphere.userData.sphereIndex = index;
                    });
                }
            } else {
                // Just store current values for next comparison
                line.userData.lastWidth = currentWidth;
                line.userData.lastAngle = currentAngle;
                line.userData.lastIncline = currentIncline;
            }
        }

        function endSphereDrag() {

                if (selectedSphere) {
                    const plane = selectedSphere.userData.parentPlane;
                    const spheres = plane.mesh.userData.topViewSpheres;

                    if (spheres && spheres.length === 2) {
                        // Get final sphere positions
                        const sphere1Pos = spheres[0].position.clone();
                        const sphere2Pos = spheres[1].position.clone();

                        // Calculate new plane center
                        const centerX = (sphere1Pos.x + sphere2Pos.x) / 2;
                        const centerZ = (sphere1Pos.z + sphere2Pos.z) / 2;

                        // Calculate new plane width
                        const newWidth = Math.sqrt(
                            Math.pow(sphere2Pos.x - sphere1Pos.x, 2) +
                            Math.pow(sphere2Pos.z - sphere1Pos.z, 2)
                        );

                        // Calculate rotation angle from sphere positions
                        const deltaX = sphere2Pos.x - sphere1Pos.x;
                        const deltaZ = sphere2Pos.z - sphere1Pos.z;
                        const newAngle = -Math.atan2(deltaZ, deltaX) * (180 / Math.PI);

                        // Update plane properties
                        plane.mesh.position.x = centerX;
                        plane.mesh.position.z = centerZ;
                        plane.x = centerX;
                        plane.z = centerZ;
                        plane.width = newWidth;
                        plane.defaultWidth = newWidth;
                        plane.angle = newAngle;

                // Create wireframe points that connect the spheres

                // Create a rectangle that connects the two spheres
                const points = [
                    new THREE.Vector3(sphere1Pos.x, 0, sphere1Pos.z - halfWidth),
                    new THREE.Vector3(sphere2Pos.x, 0, sphere2Pos.z - halfWidth),

                // Update line geometry to connect the spheres

                // Position the line at the origin (since points are in world coordinates)
                line.position.set(0, 0, 0);
                line.rotation.set(0, 0, 0);
            }

                    updateReceiverFaceFlipUniform(plane);
                    if (plane.contourData && !warnedContour) {
                        console.warn('Normal direction changed; recalculate if needed');
                        warnedContour = true;
                    }
                }
            });
            captureState();
            if (selectedPlanes.length === 1) {
                updateGUI(selectedPlanes[0]);
            }
        }

        function installReceiverDualFaceOnMaterial(material, plane) {
            const uFlip = { value: plane.positive ? 1.0 : 0.0 };
            const uOn = { value: 1.0 };
            material.userData = material.userData || {};
            material.userData.receiverDualInstalled = true;
            material.userData.receiverShaderUniforms = { uFlipReceiverFace: uFlip, uReceiverDual: uOn };
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uFlipReceiverFace = uFlip;
                shader.uniforms.uReceiverDual = uOn;
                if (shader.fragmentShader.indexOf('uReceiverDualPatch') === -1) {
                    shader.fragmentShader = 'uniform float uFlipReceiverFace;\nuniform float uReceiverDual;\n' + shader.fragmentShader;
                    shader.fragmentShader = shader.fragmentShader.replace(
                        '#include <output_fragment>',
                        'if (uReceiverDual > 0.5) { bool _recvF = gl_FrontFacing; if (uFlipReceiverFace > 0.5) _recvF = !_recvF; if (!_recvF) outgoingLight = vec3(0.0); } //uReceiverDualPatch\n#include <output_fragment>'
                    );
                }
            };
            material.side = THREE.DoubleSide;
            material.needsUpdate = true;
        }

        function planeHasContourTexture(plane) {
            const mat = plane && plane.mesh ? plane.mesh.material : null;
            return !!(mat && mat.map && mat.map.isContourTexture);
        }

        /**
         * Selection visuals:
         * - Normal planes: tint material color to grey.
         * - Receiver contour planes: keep texture colors intact (white base) and use emissive to indicate selection.
         */
        function setPlaneSelectedVisual(plane, selected) {
            if (!plane || !plane.mesh || !plane.mesh.material) return;
            const mat = plane.mesh.material;

            if (planeHasContourTexture(plane)) {
                if (mat.color) mat.color.set(0xffffff);
                if (mat.emissive) {
                    mat.emissive.setHex(selected ? 0x202020 : 0x000000);
                    mat.emissiveIntensity = 1;
                }
                return;
            }

            if (mat.emissive) {
                mat.emissive.setHex(0x000000);
                mat.emissiveIntensity = 1;
            }
            if (mat.color) {
                mat.color.setHex(selected ? 0x808080 : plane.color);
            }
        }

        /** Replace or patch mesh material for Receiver (dual-face shader) vs Emitter/Inert (double-sided, no shader). */
        function setPlaneMaterialForType(plane) {
            if (!plane || !plane.mesh) return;
            const mesh = plane.mesh;
            const wasMap = mesh.material && mesh.material.map;
            const mapRef = wasMap ? mesh.material.map : null;

            if (plane.type === "Receiver") {
                if (mesh.material && mesh.material.userData && mesh.material.userData.receiverDualInstalled) {
                    if (mapRef) mesh.material.map = mapRef;
                    updateReceiverFaceFlipUniform(plane);
                    if (planeHasContourTexture(plane)) {
                        setPlaneSelectedVisual(plane, selectedPlanes.includes(plane));
                    }
                    return;
                }
                const old = mesh.material;
                const c = old && old.color ? old.color.clone() : new THREE.Color(plane.color);
                const savedMap = old && old.map ? old.map : null;
                if (old) {
                    old.map = null;
                    old.dispose();
                }
                const m = new THREE.MeshStandardMaterial({
                    color: c,
                    side: THREE.DoubleSide,
                    wireframe: false
                });
                if (savedMap) m.map = savedMap;
                else if (mapRef) m.map = mapRef;
                mesh.material = m;
                installReceiverDualFaceOnMaterial(m, plane);
                if (planeHasContourTexture(plane)) {
                    setPlaneSelectedVisual(plane, selectedPlanes.includes(plane));
                }
            } else {
                if (mesh.material) {
                    const m0 = mesh.material;
                    m0.map = null;
                    m0.dispose();
                }
                const m = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(plane.color),
                    side: THREE.DoubleSide,
                    wireframe: false
                });
                mesh.material = m;
            }
        }

        // Multi-select functions for height and type changes
        function changeMultiplePlanesHeight(newHeight) {
            if (selectedPlanes.length < 2) return;
            newHeight = roundParamValue(newHeight);

            captureState("Change multiple planes height");

            selectedPlanes.forEach(planeData => {
                // Update height
                planeData.height = newHeight;
                planeData.defaultHeight = newHeight;

                // Update geometry
                planeData.mesh.geometry.dispose();
                planeData.mesh.geometry = new THREE.PlaneGeometry(planeData.width, planeData.height);
                planeData.mesh.scale.set(1, 1, 1);

                // Update top view line if in top view
                if (activeCamera === cameras.top) {
                    updateTopViewLine(planeData);
                    // Ensure spheres are selectable after update
                    if (planeData.mesh.userData.topViewSpheres) {
                        planeData.mesh.userData.topViewSpheres.forEach(sphere => {
                            sphere.userData.isSelectable = true;
                        });
                    }
                }
            });
        }

        function changeMultiplePlanesType(newType) {
            if (selectedPlanes.length < 2) return;

            captureState("Change multiple planes type");

            selectedPlanes.forEach(planeData => {
                // Update type
                planeData.type = newType;

                // Update color based on type
                const typeLower = String(newType || '').toLowerCase();
                let hex = 0xe6c200; // receiver default (dark yellow)
                if (typeLower === 'emitter') {
                    hex = 0xff0000; // emitter red
                } else if (typeLower === 'inert') {
                    hex = 0x0000ff; // inert blue
                }
                planeData.color = hex;

                if (newType !== "Receiver") {
                    clearContourFromPlane(planeData);
                }
                setPlaneMaterialForType(planeData);

                // Keep selection highlight
                setPlaneSelectedVisual(planeData, true);

                // Update top view line color if in top view
                updateTopViewLineColor(planeData, 0x808080);

                if (typeLower !== 'emitter') {
                    planeData.temperature = 0;
                }
            });
        }

        // Function to change temperature (Heat Flux) for all selected emitter planes
        function changeMultiplePlanesTemperature(newTemperature) {
            if (selectedPlanes.length < 2) return;
            newTemperature = roundParamValue(newTemperature);

            captureState("Change multiple planes temperature");

            // Count how many emitters were updated
            let emitterCount = 0;

            selectedPlanes.forEach(planeData => {
                // Only update temperature for emitter planes
                if (planeData.type === 'Emitter') {
                    planeData.temperature = newTemperature;
                    emitterCount++;
                }
            });

            // Log if no emitters were found
            if (emitterCount === 0) {
                console.warn('No emitters in selection');
            }
        }

        // Function to create a new plane
        function createPlane(width = 1, height = 1, skipStateCapture = false) {
            const geometry = new THREE.PlaneGeometry(width, height);
            // Default to Receiver type with dark yellow color
            const defaultType = "Receiver";
            const defaultColorHex = 0xe6c200; // Darker yellow for better contrast
            const material = new THREE.MeshStandardMaterial({
                color: defaultColorHex,
                side: THREE.DoubleSide,
                wireframe: false,
            });

            const plane = new THREE.Mesh(geometry, material);
            plane.position.set(0, 0, 0);
            plane.rotation.y = Math.PI * 2;
            plane.scale.set(1, 1, 1);
            const defaultName = `Plane ${planes.length + 1}`;
            // Store plane data
            const planeData = {
                id: generateId(),
                mesh: plane,
                width: width,
                height: height,
                // Store default values
                defaultWidth: width,
                defaultHeight: height,
                defaultX: 0,
                defaultY: height / 2,
                defaultZ: 0,
                defaultAngle: 0,
                defaultColor: material.color.getHex(),
                name: defaultName,
                x: plane.position.x,
                y: plane.position.y,
                z: plane.position.z,
                angle: plane.rotation.y * 180 / Math.PI,
                incline: plane.rotation.x * 180 / Math.PI,
                color: material.color.getHex(),
                temperature: 0,
                type: defaultType,
                positive: true
            };

            planes.push(planeData);
            sceneContentGroup.add(plane);

            // Make plane selectable
            plane.userData = planeData;
            if (history.length === 0) {
                initializeHistory();
            }

            // Only capture state if not skipped (e.g., during continuous plane creation)
            if (!skipStateCapture) {
                captureState("Plane created");
            }
            installReceiverDualFaceOnMaterial(plane.material, planeData);
            if (typeof rebuildTraElementsList === 'function') {
                rebuildTraElementsList();
            }
            return planeData;

        }

        function resetPlaneToDefault() {
            if (selectedPlanes.length === 0) {
                alert("Please select at least one plane first");
                return;
            }

            captureState("Before reset");

            if (selectedPlaneGroup) {
                ungroupPlanes();
            }

            selectedPlanes.forEach(planeData => {
                // Reset all properties to defaults
                planeData.width = 1;
                planeData.height = 1;
                planeData.x = 0;
                planeData.y = 0.5;
                planeData.z = 0;
                planeData.angle = 0;
                planeData.incline = 0; // Reset incline to 0
                planeData.color = planeData.defaultColor;

                // Update the mesh
                planeData.mesh.geometry.dispose();
                planeData.mesh.geometry = new THREE.PlaneGeometry(
                    planeData.width,
                    planeData.height
                );

                planeData.mesh.position.set(
                    planeData.x,
                    planeData.y,
                    planeData.z
                );
                planeData.mesh.rotation.set(
                    planeData.incline * Math.PI / 180, // x rotation (incline)
                    planeData.angle * Math.PI / 180,   // y rotation (angle)
                    0                                  // z rotation
                );
                planeData.mesh.scale.set(1, 1, 1);
                setPlaneSelectedVisual(planeData, true);
            });

            // Update the GUI
            if (selectedPlanes.length > 0) {
                updateGUI(selectedPlanes[selectedPlanes.length - 1]);
            }

        }

        // Function to make plane stand on ground (bottom edge at y=0)
        // Uses world space so it works for both single selection and multi-selection (grouped planes).
        function standPlaneOnGround() {
            if (selectedPlanes.length === 0) {
                alert("Please select at least one plane first");
                return;
            }

            captureState("Before stand");

            const worldPos = new THREE.Vector3();
            const worldQuat = new THREE.Quaternion();

            selectedPlanes.forEach(planeData => {
                const mesh = planeData.mesh;
                mesh.updateMatrixWorld(true);
                mesh.getWorldPosition(worldPos);
                mesh.getWorldQuaternion(worldQuat);

                // Corners in local space (same as computeWorldCorners / generatePointsOnPlane)
                const halfWidth = planeData.width / 2;
                const halfHeight = planeData.height / 2;
                const corners = [
                    new THREE.Vector3(-halfWidth, -halfHeight, 0),
                    new THREE.Vector3(halfWidth, -halfHeight, 0),
                    new THREE.Vector3(halfWidth, halfHeight, 0),
                    new THREE.Vector3(-halfWidth, halfHeight, 0)
                ];

                // Transform corners to world space
                const worldCorners = corners.map(corner => {
                    const wc = corner.clone().applyQuaternion(worldQuat).add(worldPos);
                    return wc;
                });

                const minY = Math.min(...worldCorners.map(c => c.y));
                const yOffset = -minY;
                const newWorldY = worldPos.y + yOffset;

                // Update plane data (world position)
                planeData.x = worldPos.x;
                planeData.y = newWorldY;
                planeData.z = worldPos.z;

                if (selectedPlaneGroup && mesh.parent === selectedPlaneGroup) {
                    // Multi-selection: mesh is in group; store new world position and set local position
                    const newWorldPos = new THREE.Vector3(worldPos.x, newWorldY, worldPos.z);
                    if (originalPositions.has(planeData)) {
                        originalPositions.get(planeData).worldPosition.copy(newWorldPos);
                    }
                    mesh.parent.worldToLocal(newWorldPos);
                    mesh.position.copy(newWorldPos);
                } else {
                    // Single selection: mesh is directly in scene; position is world
                    mesh.position.set(worldPos.x, newWorldY, worldPos.z);
                }
            });

            // If we have a group, recenter it so local positions stay consistent
            if (selectedPlaneGroup && selectedPlanes.length > 1) {
                updateGroupPosition();
            }

            if (activeCamera === cameras.top) {
                selectedPlanes.forEach(plane => updateTopViewLine(plane));
            }

            if (selectedPlanes.length > 0) {
                updateGUI(selectedPlanes[selectedPlanes.length - 1]);
            }

            captureState("After stand");
        }

        // Add event listener for the stand button
        document.getElementById("standPlane").addEventListener("click", standPlaneOnGround);

        function deleteplanefn() {
            if (selectedPlanes.length === 0) return;

            captureState("Before delete");

            // Filter out planes that no longer exist (check planes array and mesh validity)
            // Note: Don't check scene.children because multi-selected planes are in selectedPlaneGroup, not scene
            const validSelectedPlanes = selectedPlanes.filter(planeData => {
                return planes.includes(planeData) && planeData.mesh && planeData.mesh.parent;
            });

            if (validSelectedPlanes.length === 0) {
                console.warn('No planes to delete');
                selectedPlanes = [];
                return;
            }

            // Delete all valid selected planes
            validSelectedPlanes.forEach(planeData => {
                // Detach transform controls if they're attached to this plane or its group
                if (transformControlss.object === planeData.mesh ||
                    (selectedPlaneGroup && transformControlss.object === selectedPlaneGroup)) {
                    transformControlss.detach();
                }

                // Remove the plane mesh from its parent (could be scene or selectedPlaneGroup)
                if (planeData.mesh.parent) {
                    planeData.mesh.parent.remove(planeData.mesh);
                }

                // Remove top view line if it exists
                if (planeData.mesh.userData.topViewLine) {
                    sceneContentGroup.remove(planeData.mesh.userData.topViewLine);
                    planeData.mesh.userData.topViewLine = null;
                }

                // Remove top view spheres if they exist
                if (planeData.mesh.userData.topViewSpheres) {
                    planeData.mesh.userData.topViewSpheres.forEach(sphere => {
                        sceneContentGroup.remove(sphere);
                    });
                    planeData.mesh.userData.topViewSpheres = null;
                }

                const index = planes.indexOf(planeData);
                if (index > -1) {
                    planes.splice(index, 1);
                }

                planeData.mesh.geometry.dispose();
                planeData.mesh.material.dispose();
            });

            // Clear group if it exists
            if (selectedPlaneGroup) {
                sceneContentGroup.remove(selectedPlaneGroup);
                selectedPlaneGroup = null;
                originalPositions.clear();
            }

            gui.destroy();
            selectedPlanes = [];
            captureState();
            if (typeof rebuildTraElementsList === 'function') {
                rebuildTraElementsList();
            }
        }

            PLANE_TYPE_OPTIONS.forEach(t => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'tra-density-btn';
                b.setAttribute('data-plane-type', t);
                b.setAttribute('aria-pressed', hasHighlight && t === currentValue ? 'true' : 'false');
                b.textContent = t;
                if (hasHighlight && t === currentValue) b.classList.add('active');
                b.addEventListener('click', function () {
                    if (b.classList.contains('active')) return;
                    row.querySelectorAll('.tra-density-btn').forEach(x => {
                        const isOn = x === b;
                        x.classList.toggle('active', isOn);
                        x.setAttribute('aria-pressed', isOn ? 'true' : 'false');

                });
                row.appendChild(b);
            });

        }

                    if (object.userData && object.userData.isSelectable && object.userData.parentPlane &&
                        object.geometry && object.geometry.type === 'SphereGeometry') {
                        const sphere = object;
                        const currentTime = Date.now();

                        if (lastClickedSphere === sphere && (currentTime - lastSphereClickTime) < SPHERE_DOUBLE_CLICK_DELAY) {
                            // Double-click detected!

                            // Reset double-click tracking
                            lastClickedSphere = null;

                            return; // Exit early to prevent other click handlers
                        } else {
                            // First click - store for double-click detection
                            lastClickedSphere = sphere;
                            lastSphereClickTime = currentTime;

                            // Give visual feedback that sphere was clicked once (pulse opacity)
                            const originalOpacity = sphere.material.opacity;
                            sphere.material.opacity = 1.0;
                            setTimeout(() => {

        function updateTransformControls() {
            if (selectedPlanes.length === 0) {
                // Only detach if transform controls are currently attached to something
                if (transformControlss.object) {
                    transformControlss.detach();
                }
                gui.destroy();
            } else if (selectedPlaneGroup) {
                // Control the group if we have one
                transformControlss.attach(selectedPlaneGroup);
                updateGUI(selectedPlanes[selectedPlanes.length - 1]);
            } else {
                // Control the last selected plane - ensure the mesh exists in scene (planes are in sceneContentGroup)
                const targetMesh = selectedPlanes[selectedPlanes.length - 1].mesh;
                if (targetMesh && targetMesh.parent) {
                    transformControlss.attach(targetMesh);
                    updateGUI(selectedPlanes[selectedPlanes.length - 1]);
                } else {
                    // If mesh doesn't exist or was removed, detach and clear selection
                    transformControlss.detach();
                    selectedPlanes = [];
                    gui.destroy();
                }
            }

            // Configure transform controls based on mode and view
            if (transformControlss.getMode() === 'rotate') {
                // Always disable Z rotation and show only X and Y
                transformControlss.showX = true;
                transformControlss.showY = true;
                transformControlss.showZ = false;
            } else if (activeCamera === cameras.top) {
                // In top view, disable Y scaling (thickness)
                transformControlss.showX = true;
                transformControlss.showY = false;
                transformControlss.showZ = true;
            } else {
                // Default: show all axes for translate and scale
                transformControlss.showX = true;
                transformControlss.showY = true;
                transformControlss.showZ = true;
            }

            // Always keep distance display up to date
            updateDistanceDisplay();
            // Update color scale inputs to reflect selected plane
            if (typeof updateColorScaleInputsForSelection === 'function') {
                updateColorScaleInputsForSelection();
            }
            if (typeof syncTraElementsListSelection === 'function') {
                syncTraElementsListSelection();
            }

        function createOrUpdateGroup() {
            // If no group exists, create one
            if (!selectedPlaneGroup) {
                selectedPlaneGroup = new THREE.Group();
                sceneContentGroup.add(selectedPlaneGroup);

                // Store original positions and parents
                originalPositions = new Map();
                selectedPlanes.forEach(plane => {
                    // Store the world position and original parent
                    const worldPos = plane.mesh.getWorldPosition(new THREE.Vector3());
                    originalPositions.set(plane, {
                        worldPosition: worldPos.clone(),
                        parent: plane.mesh.parent
                    });

                    // Calculate local position relative to group center
                    const center = calculateGroupCenter();
                    plane.mesh.position.copy(worldPos).sub(center);

                    // Add to group
                    selectedPlaneGroup.add(plane.mesh);
                });

                // Position group at center
                const center = calculateGroupCenter();
                selectedPlaneGroup.position.copy(center);
            } else {
                // For existing group, just add any new planes
                selectedPlanes.forEach(plane => {
                    if (plane.mesh.parent !== selectedPlaneGroup) {
                        const worldPos = plane.mesh.getWorldPosition(new THREE.Vector3());
                        originalPositions.set(plane, {
                            worldPosition: worldPos.clone(),
                            parent: plane.mesh.parent
                        });

                        const center = selectedPlaneGroup.position;
                        plane.mesh.position.copy(worldPos).sub(center);
                        selectedPlaneGroup.add(plane.mesh);
                    }
                });
            }
            // Don't capture state when creating/updating groups - only capture when the group is actually transformed
        }

        function calculateGroupCenter() {
            const center = new THREE.Vector3();
            selectedPlanes.forEach(plane => {
                if (originalPositions.has(plane)) {
                    center.add(originalPositions.get(plane).worldPosition);
                } else {
                    center.add(plane.mesh.getWorldPosition(new THREE.Vector3()));
                }
            });
            center.divideScalar(selectedPlanes.length);
            return center;
        }

        function ungroupPlanes() {
            if (!selectedPlaneGroup) return;

            // Restore planes to their original positions and parents
            selectedPlanes.forEach(plane => {
                const original = originalPositions.get(plane);
                if (original) {
                    // Remove from group first
                    selectedPlaneGroup.remove(plane.mesh);

                    // Add back to original parent (usually the scene)
                    original.parent.add(plane.mesh);

                    // Restore world position
                    plane.mesh.position.copy(original.worldPosition);

                    // Update plane data to match world position
                    plane.x = plane.mesh.position.x;
                    plane.y = plane.mesh.position.y;
                    plane.z = plane.mesh.position.z;
                }
            });

            // Clean up the group
            sceneContentGroup.remove(selectedPlaneGroup);
            selectedPlaneGroup = null;
            originalPositions.clear();

            // Update GUI to reflect changes
            if (selectedPlanes.length > 0) {
                updateGUI(selectedPlanes[selectedPlanes.length - 1]);
            }
            // Don't capture state when ungrouping - the visual state doesn't change
        }

                const index = selectedPlanes.indexOf(planeData);
                if (index === -1) {
                    selectedPlanes.push(planeData);

                    updateTopViewLineColor(planeData, 0x808080);
                    if (selectedPlanes.length > 1) {
                        createOrUpdateGroup();
                    }
                } else {
                    selectedPlanes.splice(index, 1);
                    setPlaneSelectedVisual(planeData, false);
                    updateTopViewLineColor(planeData, planeData.color);
                    if (selectedPlaneGroup && planeData.mesh.parent === selectedPlaneGroup) {
                        const original = originalPositions.get(planeData);
                        selectedPlaneGroup.remove(planeData.mesh);
                        if (original) {
                            original.parent.add(planeData.mesh);
                            planeData.mesh.position.copy(original.worldPosition);
                        }
                        planeData.mesh.visible = true;
                    }
                    if (selectedPlanes.length > 1) {
                        createOrUpdateGroup();
                    } else {
                        ungroupPlanes();
                        planes.forEach(p => p.mesh.visible = true);
                    }
                }
            } else {
                if (selectedPlanes.length === 1 && selectedPlanes[0] === planeData) {
                    selectedPlanes = [];
                    setPlaneSelectedVisual(planeData, false);
                    updateTopViewLineColor(planeData, planeData.color);
                    ungroupPlanes();
                } else {
                    ungroupPlanes();
                    planes.forEach(p => {
                        setPlaneSelectedVisual(p, false);
                        updateTopViewLineColor(p, p.color);
                    });
                    planes.forEach(p => p.mesh.visible = true);
                    selectedPlanes = [planeData];
                    setPlaneSelectedVisual(planeData, true);
                    updateTopViewLineColor(planeData, 0x808080);
                }

            updateTransformControls();

        // Align TransformControls scale handle snap with app grid snap (0.5 when on, continuous when off).
        function syncTransformControlsScaleSnap() {

        function initTransformControls() {
            transformControlss = new THREE.TransformControls(activeCamera, renderer.domElement);
            transformControlss.setSpace('local');

                if (event.value && selectedPlaneGroup && transformControlss.object === selectedPlaneGroup) {
                    groupDragStartPosition = selectedPlaneGroup.position.clone();
                }
                // When dragging ends (event.value === false)
                if (!event.value) {
                    suppressPlaneClickAfterTransform = true;
                    if (selectedPlaneGroup && transformControlss.object === selectedPlaneGroup) {
                        // Commit the group transformation to individual planes
                        commitGroupTransform();

                        captureState("Transform drag ended");

            transformControlss.addEventListener('objectChange', function () {

                applyGridSnapping();

                if (selectedPlaneGroup && transformControlss.object === selectedPlaneGroup) {
                    // Update all planes when group moves
                    selectedPlanes.forEach(plane => {
                        plane.x = roundParamValue(plane.mesh.position.x + selectedPlaneGroup.position.x);
                        plane.y = roundParamValue(plane.mesh.position.y + selectedPlaneGroup.position.y);
